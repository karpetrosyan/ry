version: 1

defaults:
  include:
    - package: std

packages:
  std:
    rules:
      - id: dunder-anext
        kind: regex
        match: '\b__anext__\b'
        replace: '__next__'

      - id: dunder-aenter
        kind: regex
        match: '\b__aenter__\b'
        replace: '__enter__'

      - id: dunder-aexit
        kind: regex
        match: '\b__aexit__\b'
        replace: '__exit__'

targets:
  # File-to-file transformation (reads input file, writes to output file)
  # - input: "foo/bar/async_something.py"
  #   output: "foo/bar/sync_something.py"

  # - input: "foo/bar/baz.py"
  #   output: "foo/bar/bee.py"
  #   inherit_defaults: false
  #   include:
  #     - package: std
  #       exclude:
  #         - dunder-aexit
  #   rules:
  #     - id: strip-await
  #       kind: regex
  #       match: '\bawait\s+'
  #       replace: ''

  # Inline transformation (looks for # unasync: generate @tag markers in files)
  # Run with: ry --config ry.yml <path>
  # Example: ry --config ry.yml src/
  - tag: asd
